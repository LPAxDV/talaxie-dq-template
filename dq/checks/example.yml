theme: my_theme

checks:

  # 🔹 Comparaison CA
  - name: ca
    table: sales
    measure: sum(amount)
    tolerance: 0.01

  # 🔹 Comparaison volume
  - name: volume
    table: sales
    measure: count(*)

  # 🔹 Avec filtre (ex: données récentes)
  - name: recent_sales
    table: sales
    measure: count(*)
    where: "sale_date >= current_date - 1"

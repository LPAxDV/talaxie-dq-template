# =========================================
# DATA QUALITY CHECK TEMPLATE
# =========================================
# Copier ce fichier et l’adapter à ton projet

theme: my_theme_name

checks:
  # Exemple 1 : chiffre d’affaires
  - name: ca_check
    table: sales
    measure: sum(amount)
    tolerance: 0.01

  # Exemple 2 : volume
  - name: volume_check
    table: sales
    measure: count(*)

  # Exemple 3 : avec filtre
  - name: recent_sales
    table: sales
    measure: count(*)
    where: "sale_date >= current_date - 1"
